<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>呼び出し状況</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f5; color: #222; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .store-name { font-size: 18px; font-weight: bold; text-align: center; }
    .calling-label { text-align: center; color: #666; font-size: 14px; }
    .calling-number { text-align: center; font-size: 56px; font-weight: bold; color: #c0392b; margin: 4px 0; }
    .my-row { display: flex; gap: 8px; align-items: center; }
    .my-row input { flex: 1; font-size: 18px; padding: 8px; }
    .my-row button { font-size: 16px; padding: 8px 16px; }
    .my-result { margin-top: 10px; font-size: 18px; text-align: center; min-height: 24px; }
    .info { font-size: 16px; }
    .recent { font-size: 16px; }
    .meta { font-size: 12px; color: #888; text-align: center; }
    .err { color: #c0392b; }
    .notify-row { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
    .notify-row button { font-size: 16px; padding: 8px 16px; }
    .notify-status { font-size: 14px; color: #2e7d32; }
    .keep-open { font-size: 12px; color: #888; text-align: center; margin-top: 8px; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .overlay-box { background: #fff; border-radius: 16px; padding: 32px 24px; text-align: center; max-width: 90%; }
    .overlay-title { font-size: 28px; font-weight: bold; color: #c0392b; }
    .overlay-sub { font-size: 48px; font-weight: bold; margin: 12px 0 20px; }
    .overlay-close { font-size: 18px; padding: 12px 32px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div id="store-name" class="store-name"></div>
    <div class="calling-label">ただいまお呼び出し中</div>
    <div id="calling-number" class="calling-number">—</div>
  </div>

  <div class="card">
    <div class="my-row">
      <input id="my-number" type="number" inputmode="numeric" placeholder="あなたの番号">
      <button id="my-check">確認</button>
    </div>
    <div id="my-result" class="my-result"></div>
    <div class="notify-row">
      <button id="notify-btn">🔔 通知を受け取る</button>
      <span id="notify-status" class="notify-status"></span>
    </div>
  </div>

  <div class="card info">
    <div id="waiting-count">—</div>
  </div>

  <div class="card recent">
    <div>直近の呼び出し</div>
    <div id="recent-called">—</div>
  </div>

  <div id="meta" class="meta"></div>
  <div class="keep-open">※通知のため、この画面を開いたままにしてください</div>
</div>

<script src="status.js"></script>
<script>
  // ▼ 店ごとに設定（anonキーは公開前提で安全。秘密キーはここには書かない）
  const SUPABASE_URL = 'https://gfnpoamqcwydgxiwrcbj.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_o-b8b8jo0BYqNXm2I-bLXQ_F4nKUm_k';
  const ROW_ID = 'main';
  const POLL_MS = 5000;

  const THRESHOLD = 1;                 // あと何組以下で「もうすぐ」
  const NOTIFY_KEY = 'seiriken-notify';
  let notifyNumber = null;             // 通知対象の整理券番号（未登録は null）
  let notifyFired = { soon: false, turn: false };
  let audioCtx = null;

  function loadNotify() {
    try {
      const raw = localStorage.getItem(NOTIFY_KEY);
      if (!raw) return;
      const obj = JSON.parse(raw);
      if (obj && typeof obj.number === 'number') {
        notifyNumber = obj.number;
        notifyFired = { soon: !!(obj.fired && obj.fired.soon), turn: !!(obj.fired && obj.fired.turn) };
      }
    } catch (e) { /* 壊れていたら無視 */ }
  }

  function saveNotify() {
    if (notifyNumber === null) { localStorage.removeItem(NOTIFY_KEY); return; }
    localStorage.setItem(NOTIFY_KEY, JSON.stringify({ number: notifyNumber, fired: notifyFired }));
  }

  function ensureAudio() {
    if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) { audioCtx = new AC(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
    } catch (e) { audioCtx = null; }
  }

  function beep(times) {
    if (!audioCtx) return;
    let t = audioCtx.currentTime;
    for (let i = 0; i < times; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.2;
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t); osc.stop(t + 0.25);
      t += 0.4;
    }
  }

  function showOverlay(stage) {
    const old = document.getElementById('overlay');
    if (old && old.parentNode) old.parentNode.removeChild(old);

    const overlay = document.createElement('div');
    overlay.id = 'overlay';
    overlay.className = 'overlay';

    const box = document.createElement('div');
    box.className = 'overlay-box';

    const title = document.createElement('div');
    title.className = 'overlay-title';
    title.textContent = (stage === 'turn') ? 'あなたの番です！' : 'まもなくお呼び出しです';

    const sub = document.createElement('div');
    sub.className = 'overlay-sub';
    sub.textContent = notifyNumber + '番';

    const btn = document.createElement('button');
    btn.className = 'overlay-close';
    btn.textContent = '閉じる';
    btn.addEventListener('click', function () {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    });

    box.appendChild(title);
    box.appendChild(sub);
    box.appendChild(btn);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  }

  function fireAlert(stage) {
    beep(stage === 'turn' ? 3 : 1);
    if (navigator.vibrate) {
      navigator.vibrate(stage === 'turn' ? [400, 150, 400] : [200]);
    }
    showOverlay(stage);
  }

  function refreshNotifyStatus() {
    const status = document.getElementById('notify-status');
    const btn = document.getElementById('notify-btn');
    if (notifyNumber === null) {
      status.textContent = '';
      btn.textContent = '🔔 通知を受け取る';
    } else {
      status.textContent = '🔔 通知ON（' + notifyNumber + '番）';
      btn.textContent = '解除';
    }
  }

  function maybeNotify(row) {
    if (notifyNumber === null) return;
    const res = evaluateNotify(row, notifyNumber, THRESHOLD, notifyFired);
    if (res.stage) {
      notifyFired = res.fired;
      saveNotify();
      fireAlert(res.stage);
    }
  }

  document.getElementById('notify-btn').addEventListener('click', function () {
    if (notifyNumber !== null) {        // 解除
      notifyNumber = null;
      notifyFired = { soon: false, turn: false };
      saveNotify();
      refreshNotifyStatus();
      return;
    }
    const raw = document.getElementById('my-number').value;
    const n = parseInt(raw, 10);
    if (raw === '' || isNaN(n)) {
      document.getElementById('notify-status').textContent = '番号を入力してください';
      return;
    }
    ensureAudio();                      // ユーザー操作で音を解錠
    notifyNumber = n;
    notifyFired = { soon: false, turn: false };
    saveNotify();
    refreshNotifyStatus();
  });

  let lastRow = null;

  function setText(id, text) {
    document.getElementById(id).textContent = text;
  }

  function fmtMinutes(ms) {
    if (ms === null || ms === undefined) return null;
    const min = Math.max(1, Math.round(ms / 60000));
    return min;
  }

  function renderRow(row) {
    // 呼び出し中
    if (row.calling_number === null || row.calling_number === undefined) {
      setText('calling-number', '準備中です');
    } else {
      setText('calling-number', row.calling_number + '番');
    }
    // 待ち組数
    setText('waiting-count', '現在 ' + (row.waiting_count || 0) + '組お待ち');
    // 直近の呼び出し
    const recent = Array.isArray(row.recent_called) ? row.recent_called : [];
    setText('recent-called', recent.length ? recent.join('・') : '—');
    // 自分の番号の結果を再計算
    renderMyResult();
    // メタ（再接続中…の赤表示を回復時に解除）
    document.getElementById('meta').classList.remove('err');
    let when = '';
    if (row.updated_at) {
      const d = new Date(row.updated_at);
      when = '最終更新 ' + d.toLocaleTimeString();
    }
    setText('meta', when + '（自動更新中）');
  }

  function renderMyResult() {
    const el = document.getElementById('my-result');
    el.classList.remove('err');
    const raw = document.getElementById('my-number').value;
    if (raw === '' || lastRow === null) { el.textContent = ''; return; }
    const myNumber = parseInt(raw, 10);
    if (isNaN(myNumber)) { el.textContent = ''; return; }
    const waiting = Array.isArray(lastRow.waiting_numbers) ? lastRow.waiting_numbers : [];
    const res = computeAhead(waiting, myNumber);
    if (!res.found) {
      el.textContent = '呼び出し済み、または完了の可能性があります';
      return;
    }
    const waitMs = estimateWaitMsForNumber(res.ahead, lastRow.avg_serve_ms);
    const min = fmtMinutes(waitMs);
    if (min === null) {
      el.textContent = 'あと約' + res.ahead + '組';
    } else {
      el.textContent = 'あと約' + res.ahead + '組・約' + min + '分';
    }
  }

  async function poll() {
    const base = SUPABASE_URL.replace(/\/+$/, '');
    const url = base + '/rest/v1/queue_status?id=eq.' + ROW_ID + '&select=*';
    try {
      const res = await fetch(url, { headers: { apikey: SUPABASE_ANON_KEY } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const rows = await res.json();
      if (rows && rows.length > 0) {
        lastRow = rows[0];
        renderRow(lastRow);
        maybeNotify(lastRow);
      }
    } catch (e) {
      // 直前の値は保持し、状態だけ「再接続中」に
      const meta = document.getElementById('meta');
      meta.textContent = '再接続中…';
      meta.classList.add('err');
    }
  }

  document.getElementById('my-check').addEventListener('click', renderMyResult);
  document.getElementById('my-number').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') renderMyResult();
  });

  loadNotify();
  refreshNotifyStatus();
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
