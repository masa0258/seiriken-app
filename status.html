<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>呼び出し状況</title>
  <style>
    :root {
      --bg: #fbf4ec;
      --card: #ffffff;
      --ink: #4a3b2e;
      --ink-soft: #9b8a78;
      --ink-faint: #a89684;
      --store: #9a6b3f;
      --accent: #ef6c47;
      --accent-strong: #c2410c;
      --notify-bg: #fff3e8;
      --chip-bg: #fde7da;
      --input-border: #ecd9c5;
      --placeholder: #9a6f48;
      --shadow-card: 0 2px 8px rgba(154,107,63,.10);
      --shadow-hero: 0 6px 16px rgba(239,108,71,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',system-ui,sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 18px 16px 28px; }

    .store-name { text-align: center; font-size: 15px; font-weight: 700; color: var(--store); margin: 4px 0 12px; }

    .hero {
      background: linear-gradient(160deg, #ff8a5b, var(--accent));
      border-radius: 22px; padding: 26px 18px; text-align: center; color: #fff;
      box-shadow: var(--shadow-hero); margin-bottom: 14px;
    }
    .hero-label { font-size: 13px; opacity: .92; letter-spacing: .02em; }
    .hero-number { font-size: 64px; font-weight: 800; line-height: 1.05; margin-top: 6px; }

    .card {
      background: var(--card); border-radius: 16px; padding: 16px;
      box-shadow: var(--shadow-card); margin-bottom: 12px;
    }

    .my-row { display: flex; gap: 10px; align-items: center; }
    .my-row input {
      flex: 1; font-size: 16px; padding: 12px; border: 1.5px solid var(--input-border);
      border-radius: 12px; background: #fff; color: var(--ink); min-width: 0;
    }
    .my-row input::placeholder { color: var(--placeholder); }
    .my-row button {
      font-size: 15px; font-weight: 700; padding: 12px 18px; border: none;
      border-radius: 12px; background: var(--accent); color: #fff;
    }
    .my-result { margin-top: 12px; font-size: 16px; text-align: center; min-height: 22px; color: var(--ink); }
    .my-result.err { color: var(--accent-strong); }

    .notify-card { background: var(--notify-bg); }
    .notify-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .notify-row button {
      font-size: 15px; font-weight: 700; padding: 11px 18px; border: none;
      border-radius: 12px; background: var(--accent); color: #fff;
    }
    .notify-status { font-size: 14px; font-weight: 700; color: var(--accent-strong); }

    .waiting-count { text-align: center; font-size: 16px; color: var(--ink); }
    .waiting-count .n { font-size: 22px; font-weight: 800; color: var(--accent); }

    .recent-label { font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; }
    .chips { display: flex; gap: 7px; flex-wrap: wrap; }
    .chip {
      background: var(--chip-bg); color: var(--accent-strong); border-radius: 999px;
      padding: 4px 13px; font-size: 15px; font-weight: 700;
    }

    .meta { font-size: 12px; color: var(--ink-faint); text-align: center; margin-top: 6px; }
    .meta.err { color: var(--accent-strong); }
    .keep-open { font-size: 12px; color: var(--ink-faint); text-align: center; margin-top: 10px; }

    .overlay { position: fixed; inset: 0; background: rgba(40,25,15,.62); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
    .overlay-box { background: #fff; border-radius: 22px; padding: 34px 26px; text-align: center; max-width: 92%; box-shadow: 0 18px 50px rgba(0,0,0,.3); }
    .overlay-title { font-size: 26px; font-weight: 800; color: var(--accent); }
    .overlay-box.turn .overlay-title { color: var(--accent-strong); }
    .overlay-sub { font-size: 52px; font-weight: 800; color: var(--ink); margin: 14px 0 22px; }
    .overlay-close { font-size: 17px; font-weight: 700; padding: 13px 34px; border: none; border-radius: 14px; background: var(--accent); color: #fff; }
    .my-row button:active, .notify-row button:active, .overlay-close:active { filter: brightness(.92); }
    .my-row button:focus-visible, .notify-row button:focus-visible, .overlay-close:focus-visible { outline: 2px solid var(--accent-strong); outline-offset: 2px; }
  </style>
</head>
<body>
<div class="wrap">
  <div id="store-name" class="store-name"></div>

  <div class="hero">
    <div class="hero-label">ただいまお呼び出し中</div>
    <div id="calling-number" class="hero-number">—</div>
  </div>

  <div class="card">
    <div class="my-row">
      <input id="my-number" type="number" inputmode="numeric" placeholder="あなたの番号">
      <button id="my-check">確認</button>
    </div>
    <div id="my-result" class="my-result"></div>
  </div>

  <div class="card notify-card">
    <div class="notify-row">
      <button id="notify-btn">🔔 通知を受け取る</button>
      <span id="notify-status" class="notify-status"></span>
    </div>
  </div>

  <div class="card">
    <div id="waiting-count" class="waiting-count">—</div>
  </div>

  <div class="card">
    <div class="recent-label">直近の呼び出し</div>
    <div id="recent-called" class="chips">—</div>
  </div>

  <div id="meta" class="meta"></div>
  <div class="keep-open">※通知のため、この画面を開いたままにしてください</div>
</div>

<script src="status.js"></script>
<script>
  // ▼ 店ごとに設定（anonキーは公開前提で安全。秘密キーはここには書かない）
  const SUPABASE_URL = 'https://gfnpoamqcwydgxiwrcbj.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_o-b8b8jo0BYqNXm2I-bLXQ_F4nKUm_k';
  const ROW_ID = 'main';
  const POLL_MS = 5000;

  const THRESHOLD = 1;                 // あと何組以下で「もうすぐ」
  const NOTIFY_KEY = 'seiriken-notify';
  let notifyNumber = null;             // 通知対象の整理券番号（未登録は null）
  let notifyFired = { soon: false, turn: false };
  let audioCtx = null;

  function loadNotify() {
    try {
      const raw = localStorage.getItem(NOTIFY_KEY);
      if (!raw) return;
      const obj = JSON.parse(raw);
      if (obj && typeof obj.number === 'number') {
        notifyNumber = obj.number;
        notifyFired = { soon: !!(obj.fired && obj.fired.soon), turn: !!(obj.fired && obj.fired.turn) };
      }
    } catch (e) { /* 壊れていたら無視 */ }
  }

  function saveNotify() {
    if (notifyNumber === null) { localStorage.removeItem(NOTIFY_KEY); return; }
    localStorage.setItem(NOTIFY_KEY, JSON.stringify({ number: notifyNumber, fired: notifyFired }));
  }

  function ensureAudio() {
    if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {}); return; }
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) { audioCtx = new AC(); if (audioCtx.state === 'suspended') audioCtx.resume().catch(function () {}); }
    } catch (e) { audioCtx = null; }
  }

  function beep(times) {
    if (!audioCtx) return;
    let t = audioCtx.currentTime;
    for (let i = 0; i < times; i++) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 880;
      gain.gain.value = 0.2;
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.onended = function () { try { osc.disconnect(); gain.disconnect(); } catch (e) {} };
      osc.start(t); osc.stop(t + 0.25);
      t += 0.4;
    }
  }

  function showOverlay(stage) {
    const old = document.getElementById('overlay');
    if (old && old.parentNode) old.parentNode.removeChild(old);

    const overlay = document.createElement('div');
    overlay.id = 'overlay';
    overlay.className = 'overlay';

    const box = document.createElement('div');
    box.className = 'overlay-box ' + (stage === 'turn' ? 'turn' : 'soon');

    const title = document.createElement('div');
    title.className = 'overlay-title';
    title.textContent = (stage === 'turn') ? 'あなたの番です！' : 'まもなくお呼び出しです';

    const sub = document.createElement('div');
    sub.className = 'overlay-sub';
    sub.textContent = notifyNumber + '番';

    const btn = document.createElement('button');
    btn.className = 'overlay-close';
    btn.textContent = '閉じる';
    btn.addEventListener('click', function () {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    });

    box.appendChild(title);
    box.appendChild(sub);
    box.appendChild(btn);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  }

  function fireAlert(stage) {
    beep(stage === 'turn' ? 3 : 1);
    if (navigator.vibrate) {
      navigator.vibrate(stage === 'turn' ? [400, 150, 400] : [200]);
    }
    showOverlay(stage);
  }

  function refreshNotifyStatus() {
    const status = document.getElementById('notify-status');
    const btn = document.getElementById('notify-btn');
    if (notifyNumber === null) {
      status.textContent = '';
      btn.textContent = '🔔 通知を受け取る';
    } else {
      status.textContent = '🔔 通知ON（' + notifyNumber + '番）';
      btn.textContent = '解除';
    }
  }

  function maybeNotify(row) {
    if (notifyNumber === null) return;
    const res = evaluateNotify(row, notifyNumber, THRESHOLD, notifyFired);
    if (res.stage) {
      notifyFired = res.fired;
      saveNotify();
      fireAlert(res.stage);
    }
  }

  document.getElementById('notify-btn').addEventListener('click', function () {
    if (notifyNumber !== null) {        // 解除
      notifyNumber = null;
      notifyFired = { soon: false, turn: false };
      saveNotify();
      refreshNotifyStatus();
      return;
    }
    const raw = document.getElementById('my-number').value;
    const n = parseInt(raw, 10);
    if (raw === '' || isNaN(n)) {
      document.getElementById('notify-status').textContent = '番号を入力してください';
      return;
    }
    ensureAudio();                      // ユーザー操作で音を解錠
    notifyNumber = n;
    notifyFired = { soon: false, turn: false };
    saveNotify();
    refreshNotifyStatus();
  });

  let lastRow = null;

  function setText(id, text) {
    document.getElementById(id).textContent = text;
  }

  function fmtMinutes(ms) {
    if (ms === null || ms === undefined) return null;
    const min = Math.max(1, Math.round(ms / 60000));
    return min;
  }

  function renderRow(row) {
    // 呼び出し中
    if (row.calling_number === null || row.calling_number === undefined) {
      setText('calling-number', '準備中です');
    } else {
      setText('calling-number', row.calling_number + '番');
    }
    // 待ち組数（数字だけ強調）
    const waitEl = document.getElementById('waiting-count');
    while (waitEl.firstChild) waitEl.removeChild(waitEl.firstChild);
    const waitN = document.createElement('span');
    waitN.className = 'n';
    waitN.textContent = (row.waiting_count || 0);
    waitEl.appendChild(document.createTextNode('現在 '));
    waitEl.appendChild(waitN);
    waitEl.appendChild(document.createTextNode(' 組お待ち'));
    // 直近の呼び出し（チップ表示）
    const recent = Array.isArray(row.recent_called) ? row.recent_called : [];
    const recentEl = document.getElementById('recent-called');
    while (recentEl.firstChild) recentEl.removeChild(recentEl.firstChild);
    if (recent.length) {
      for (let i = 0; i < recent.length; i++) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = recent[i];
        recentEl.appendChild(chip);
      }
    } else {
      recentEl.textContent = '—';
    }
    // 自分の番号の結果を再計算
    renderMyResult();
    // メタ（再接続中…の赤表示を回復時に解除）
    document.getElementById('meta').classList.remove('err');
    let when = '';
    if (row.updated_at) {
      const d = new Date(row.updated_at);
      when = '最終更新 ' + d.toLocaleTimeString();
    }
    setText('meta', when + '（自動更新中）');
  }

  function renderMyResult() {
    const el = document.getElementById('my-result');
    el.classList.remove('err');
    const raw = document.getElementById('my-number').value;
    if (raw === '' || lastRow === null) { el.textContent = ''; return; }
    const myNumber = parseInt(raw, 10);
    if (isNaN(myNumber)) { el.textContent = ''; return; }
    const waiting = Array.isArray(lastRow.waiting_numbers) ? lastRow.waiting_numbers : [];
    const res = computeAhead(waiting, myNumber);
    if (!res.found) {
      el.textContent = '呼び出し済み、または完了の可能性があります';
      return;
    }
    const waitMs = estimateWaitMsForNumber(res.ahead, lastRow.avg_serve_ms);
    const min = fmtMinutes(waitMs);
    if (min === null) {
      el.textContent = 'あと約' + res.ahead + '組';
    } else {
      el.textContent = 'あと約' + res.ahead + '組・約' + min + '分';
    }
  }

  async function poll() {
    const base = SUPABASE_URL.replace(/\/+$/, '');
    const url = base + '/rest/v1/queue_status?id=eq.' + ROW_ID + '&select=*';
    try {
      const res = await fetch(url, { headers: { apikey: SUPABASE_ANON_KEY } });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const rows = await res.json();
      if (rows && rows.length > 0) {
        lastRow = rows[0];
        renderRow(lastRow);
        maybeNotify(lastRow);
      }
    } catch (e) {
      // 直前の値は保持し、状態だけ「再接続中」に
      const meta = document.getElementById('meta');
      meta.textContent = '再接続中…';
      meta.classList.add('err');
    }
  }

  document.getElementById('my-check').addEventListener('click', renderMyResult);
  document.getElementById('my-number').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') renderMyResult();
  });

  loadNotify();
  refreshNotifyStatus();
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
