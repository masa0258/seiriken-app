<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8"><title>queue.js tests</title></head>
<body>
<h1>queue.js テスト結果</h1>
<ul id="results"></ul>
<script src="queue.js"></script>
<script>
  const results = document.getElementById('results');
  function check(name, cond) {
    const li = document.createElement('li');
    li.textContent = (cond ? 'PASS: ' : 'FAIL: ') + name;
    li.style.color = cond ? 'green' : 'red';
    results.appendChild(li);
  }

  const T1 = new Date('2026-06-01T12:05:00').getTime();
  const T2 = new Date('2026-06-01T12:40:00').getTime();
  const T3 = new Date('2026-06-01T13:10:00').getTime();

  check('initialState は 0 と空配列', (() => {
    const s = initialState();
    return s.lastIssued === 0 && s.tickets.length === 0;
  })());

  check('issueTicket は番号・人数・発券時刻を記録', (() => {
    const s = issueTicket(initialState(), 3, T1);
    const t = s.tickets[0];
    return s.lastIssued === 1 && t.number === 1 && t.partySize === 3 &&
           t.status === 'waiting' && t.issuedAt === T1 && t.calledAt === null && t.completedAt === null;
  })());

  check('issueTicket は元の state を変更しない', (() => {
    const s0 = initialState();
    issueTicket(s0, 2, T1);
    return s0.lastIssued === 0 && s0.tickets.length === 0;
  })());

  check('callTicket は呼び出し中にして案内時刻を記録', (() => {
    let s = issueTicket(initialState(), 2, T1);
    s = callTicket(s, 1, T2);
    const t = findTicket(s, 1);
    return t.status === 'calling' && t.calledAt === T2;
  })());

  check('callTicket は待機でない番号なら変化しない', (() => {
    let s = callTicket(issueTicket(initialState(), 1, T1), 1, T2); // calling
    const s2 = callTicket(s, 1, T3);
    return findTicket(s2, 1).calledAt === T2;
  })());

  check('completeTicket は完了にして完了時刻を記録', (() => {
    let s = callTicket(issueTicket(initialState(), 1, T1), 1, T2);
    s = completeTicket(s, 1, T3);
    const t = findTicket(s, 1);
    return t.status === 'done' && t.completedAt === T3;
  })());

  check('backToWaiting は待機に戻し案内時刻をクリア', (() => {
    let s = callTicket(issueTicket(initialState(), 1, T1), 1, T2);
    s = backToWaiting(s, 1);
    const t = findTicket(s, 1);
    return t.status === 'waiting' && t.calledAt === null;
  })());

  check('recallTicket は完了→呼び出し中へ戻し完了時刻をクリア', (() => {
    let s = completeTicket(callTicket(issueTicket(initialState(), 1, T1), 1, T2), 1, T3);
    s = recallTicket(s, 1);
    const t = findTicket(s, 1);
    return t.status === 'calling' && t.completedAt === null;
  })());

  check('ticketsByStatus は該当ステータスを番号順で返す', (() => {
    let s = issueTicket(issueTicket(issueTicket(initialState(), 1, T1), 1, T1), 1, T1);
    s = callTicket(s, 2, T2);
    const waiting = ticketsByStatus(s, 'waiting').map((t) => t.number).join(',');
    const calling = ticketsByStatus(s, 'calling').map((t) => t.number).join(',');
    return waiting === '1,3' && calling === '2';
  })());

  check('hourlySummary は時間帯ごとに組数と人数を集計', (() => {
    let s = issueTicket(initialState(), 2, T1);   // 12時台
    s = issueTicket(s, 3, T2);                    // 12時台
    s = issueTicket(s, 4, T3);                    // 13時台
    const sum = hourlySummary(s);
    return sum.length === 2 &&
           sum[0].groups === 2 && sum[0].guests === 5 &&
           sum[1].groups === 1 && sum[1].guests === 4;
  })());

  check('resetState は初期状態を返す', (() => {
    const s = resetState();
    return s.lastIssued === 0 && s.tickets.length === 0;
  })());
</script>
</body>
</html>
